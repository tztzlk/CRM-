{% extends 'base.html' %}
{% block title %}Удалить лид — CRM{% endblock %}
{% block page_title %}Удалить лид{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card border-danger shadow-sm">
    <div class="card-body text-center py-4">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3 d-block"></i>
        <h5 class="mb-2">Удалить лид «{{ object }}»?</h5>
        <p class="text-muted small mb-4">Это действие нельзя отменить.</p>
        <form method="post" class="d-flex gap-2 justify-content-center">
            {% csrf_token %}
            <button class="btn btn-danger" type="submit">Да, удалить</button>
            <a href="{{ object.get_absolute_url }}" class="btn btn-outline-secondary">Отмена</a>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
