{% extends 'base.html' %}
{% block title %}Удаление клиента{% endblock %}
{% block page_title %}Удаление клиента{% endblock %}
{% block content %}
<div class="card"><div class="card-body">
    <p>Удалить клиента «<strong>{{ object.full_name }}</strong>»? Это также удалит связанные сделки и записи истории.</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Удалить</button>
        <a class="btn btn-outline-secondary" href="{% url 'clients:detail' object.pk %}">Отмена</a>
    </form>
</div></div>
{% endblock %}
