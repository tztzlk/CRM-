{% extends 'base.html' %}
{% block title %}Вход — CRM{% endblock %}
{% block guest_content %}
<div class="card login-card">
    <div class="card-body p-4 p-md-5">
        <div class="brand-logo mb-3"><i class="bi bi-grid-1x2-fill"></i></div>
        <h1 class="h4 mb-1 text-center">CRM-система</h1>
        <p class="text-muted text-center small mb-4">Войдите в свою учётную запись</p>
        <form method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="alert alert-danger py-2 small">{{ form.non_field_errors }}</div>
            {% endif %}
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <div class="search-box">
                    <i class="bi bi-person"></i>
                    <input type="text" name="username" class="form-control" autofocus required placeholder="Введите логин">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Пароль</label>
                <div class="search-box">
                    <i class="bi bi-lock"></i>
                    <input type="password" name="password" class="form-control" required placeholder="Введите пароль">
                </div>
            </div>
            <button class="btn btn-primary w-100 py-2" type="submit"><i class="bi bi-box-arrow-in-right me-1"></i> Войти</button>
        </form>
    </div>
</div>
{% endblock %}
