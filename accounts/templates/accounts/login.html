{% extends 'base.html' %}
{% block title %}Вход — CRM{% endblock %}
{% block guest_content %}
<div class="card login-card shadow-sm">
    <div class="card-body p-4">
        <h1 class="h4 mb-3 text-center">
            <i class="bi bi-kanban-fill text-warning"></i> CRM
        </h1>
        <p class="text-muted text-center small">Войдите в систему</p>
        <form method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="alert alert-danger py-2">{{ form.non_field_errors }}</div>
            {% endif %}
            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input type="text" name="username" class="form-control" autofocus required>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Войти</button>
        </form>
    </div>
</div>
{% endblock %}
